# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: open-tipper
metadata:
  template: open-tipper@0.1.0
workflows:
  up:
   - azd: provision
   - azd: deploy
services:
  web:
    project: ./web
    language: js
    host: appservice
    resourceGroup: ${SERVICE_WEB_RESOURCE_GROUP}
  functions:
    project: ./functions
    language: ts
    host: function
    resourceGroup: ${SERVICE_FUNCTIONS_RESOURCE_GROUP}
    config:
      remoteBuild: true
    